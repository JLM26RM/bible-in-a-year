<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bible Plan">
<meta name="theme-color" content="#1f2a44">
<title>Bible in a Year — 261 Day Plan</title>
<style>
  :root{
    --bg:#f4f1ea; --card:#fffdf8; --ink:#23262e; --muted:#7c8088;
    --navy:#1f2a44; --gold:#b08d43; --line:#e6e1d6; --done:#9aa0a8;
    --otc:#2c5d63; --ntc:#7a3b2e; --wisc:#5b4a86;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.45;
       padding-bottom:env(safe-area-inset-bottom)}
  header{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;
         padding:14px 16px calc(12px);box-shadow:0 2px 10px rgba(0,0,0,.18);
         padding-top:calc(14px + env(safe-area-inset-top))}
  h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.2px}
  .sub{font-size:12px;opacity:.8;margin-top:2px}
  .barwrap{height:9px;background:rgba(255,255,255,.18);border-radius:6px;margin-top:11px;overflow:hidden}
  .bar{height:100%;width:0;background:var(--gold);border-radius:6px;transition:width .3s}
  .stat{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px}
  .stat b{color:var(--gold)}
  .tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .tools button{font:inherit;font-size:12px;font-weight:600;color:#fff;
         background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
         border-radius:999px;padding:6px 12px;cursor:pointer}
  .tools button:active{background:rgba(255,255,255,.25)}
  .tools button.active{background:var(--gold);border-color:var(--gold);color:#1c1a12}
  .seg{display:inline-flex;border:1px solid rgba(255,255,255,.22);border-radius:999px;overflow:hidden}
  .seg button{border:none;border-radius:0;margin:0;background:rgba(255,255,255,.06)}
  .seg button.active{background:var(--gold);color:#1c1a12}
  .refs a{color:inherit;text-decoration:none;border-bottom:1px solid var(--gold);padding-bottom:1px}
  .refs a:active{color:var(--gold)}
  .day.done .refs a{border-bottom-color:transparent}
  main{max-width:720px;margin:0 auto;padding:14px 12px 60px}
  .day{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);
       border-radius:14px;padding:13px 14px;margin-bottom:10px;
       box-shadow:0 1px 2px rgba(0,0,0,.04);cursor:pointer;transition:opacity .2s}
  .day:active{transform:scale(.997)}
  .chk{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:2px solid var(--gold);
       display:flex;align-items:center;justify-content:center;margin-top:2px;
       font-size:16px;color:#fff;background:transparent;transition:background .15s}
  .body{flex:1;min-width:0}
  .dnum{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .grp{margin-top:5px;font-size:15px}
  .grp .lbl{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.6px;
       text-transform:uppercase;padding:1px 7px;border-radius:6px;margin-right:7px;
       vertical-align:1px;color:#fff}
  .lbl.ot{background:var(--otc)} .lbl.nt{background:var(--ntc)} .lbl.wis{background:var(--wisc)}
  .refs{color:var(--ink)}
  .day.done{opacity:.55}
  .day.done .refs,.day.done .dnum{text-decoration:line-through;color:var(--done)}
  .day.done .chk{background:var(--gold);border-color:var(--gold)}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:0 16px 30px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
       background:var(--navy);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;
       opacity:0;pointer-events:none;transition:all .25s;z-index:20}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hdrtop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .titlewrap{min-width:0}
  .startbox{display:flex;flex-direction:column;gap:3px;font-size:10px;font-weight:800;
       letter-spacing:.6px;text-transform:uppercase;color:var(--gold);white-space:nowrap}
  .startbox input{font:inherit;font-size:13px;font-weight:600;color:#23262e;background:#fffdf8;
       border:1px solid var(--gold);border-radius:8px;padding:4px 7px;text-transform:none;letter-spacing:0}
  .read{flex:0 0 auto;align-self:center;text-align:right;min-width:56px;font-size:11px;
       color:var(--muted);line-height:1.25}
  .read .wd{font-weight:800;color:var(--gold);font-size:12px}
  .day.done .read .wd{color:var(--done)}
  .prayadd{display:flex;gap:8px;margin-bottom:12px}
  .prayadd input{flex:1;min-width:0;font:inherit;font-size:15px;padding:11px 13px;
       border:1px solid var(--line);border-radius:12px;background:var(--card)}
  .prayadd button{font:inherit;font-weight:700;color:#1c1a12;background:var(--gold);border:none;
       border-radius:12px;padding:0 18px;cursor:pointer}
  .pray{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
       border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .chk2{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:2px solid var(--wisc);cursor:pointer;
       display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;margin-top:1px}
  .pray.done .chk2{background:var(--wisc);border-color:var(--wisc)}
  .pbody{flex:1;min-width:0;cursor:pointer}
  .ptext{font-size:15px;word-wrap:break-word}
  .pmeta{font-size:11px;color:var(--muted);margin-top:3px}
  .pray.done .ptext{text-decoration:line-through;color:var(--done)}
  .del{flex:0 0 auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 5px}
  .del:active{color:#b3392b}
</style>
</head>
<body>
<header>
  <div class="hdrtop">
    <div class="titlewrap">
      <h1>Bible in a Year &mdash; 261-Day Plan</h1>
      <div class="sub">Built-in slack: miss up to 2 days a week and you&rsquo;re still on track. (But as Ray Comfort would say: &ldquo;No read no feed&rdquo; &#128578;)</div>
    </div>
    <label class="startbox">Start date<input type="date" id="startDate"></label>
  </div>
  <div class="barwrap"><div class="bar" id="bar"></div></div>
  <div class="stat"><span id="count">0 of 261 days</span><span><b id="pct">0%</b> complete</span></div>
  <div class="tools">
    <span class="seg"><button id="vEsv" class="active">ESV</button><button id="vLsb">LSB</button></span>
    <button id="fAll" class="active">All</button>
    <button id="fTodo">Unread</button>
    <button id="jump">Next unread &darr;</button>
    <button id="exp">Export</button>
    <button id="imp">Import</button>
    <button id="reset">Reset</button>
    <button id="pray">Prayer list</button>
  </div>
</header>
<main>
  <div id="list"></div>
  <section id="prayer" style="display:none">
    <div class="prayadd">
      <input id="prayInput" type="text" placeholder="Add a prayer request, then press Enter">
      <button id="prayAdd">Add</button>
    </div>
    <div id="prayList"></div>
  </section>
</main>
<footer>Progress saves on this device. Use Export/Import to move it between phone and computer.</footer>
<div class="toast" id="toast"></div>
<input type="file" id="file" accept="application/json" style="display:none">

const KEY = "bibleplan_v1";
let done = {};
try { done = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e){ done = {}; }
let filter = "all";
let version = localStorage.getItem("bibleplan_ver") || "ESV";
let view = "read";
let prayers = [];
try { prayers = JSON.parse(localStorage.getItem("bibleplan_pray") || "[]"); } catch(e){ prayers = []; }

function save(){ try{ localStorage.setItem(KEY, JSON.stringify(done)); }catch(e){} }
function savePray(){ try{ localStorage.setItem("bibleplan_pray", JSON.stringify(prayers)); }catch(e){} }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1600); }
function todayISO(){ const d=new Date(), z=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate()); }
function fmtWeekday(iso){ return new Date(iso+"T00:00:00").toLocaleDateString(undefined,{weekday:"short"}); }
function fmtDate(iso){ return new Date(iso+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function linkFor(ref){
  const q = ref.replace(/ /g, "+");
  return version === "LSB"
    ? "https://read.lsbible.org/?q=" + encodeURIComponent(ref)
    : "https://www.esv.org/" + q + "/";
}
function refLink(ref){
  return '<a href="'+linkFor(ref)+'" target="_blank" rel="noopener">'+ref+'</a>';
}
function grp(cls,label,arr){
  if(!arr || !arr.length) return "";
  return '<div class="grp"><span class="lbl '+cls+'">'+label+'</span><span class="refs">'
    + arr.map(refLink).join(" &middot; ") + '</span></div>';
}

function render(){
  const list = document.getElementById("list");
  let html = "", shown = 0;
  for(const d of PLAN){
    const val = done[d.d];
    const isDone = !!val;
    if(filter==="todo" && isDone) continue;
    shown++;
    let read = '<div class="read"></div>';
    if(isDone){
      read = (typeof val === "string")
        ? '<div class="read"><div class="wd">'+fmtWeekday(val)+'</div><div>'+fmtDate(val)+'</div></div>'
        : '<div class="read"><div class="wd">Read</div></div>';
    }
    html += '<div class="day'+(isDone?" done":"")+'" data-d="'+d.d+'">'
      + '<div class="chk">'+(isDone?"✓":"")+'</div>'
      + '<div class="body"><div class="dnum">Day '+d.d+'</div>'
      + grp("ot","OT",d.ot) + grp("nt","NT",d.nt) + grp("wis","Ps/Prov",d.wis)
      + '</div>' + read + '</div>';
  }
  if(shown===0) html = '<div class="empty">All caught up. 🎉<br>Every reading is checked off.</div>';
  list.innerHTML = html;
  const n = Object.values(done).filter(Boolean).length;
  const pct = Math.round(n/PLAN.length*100);
  document.getElementById("bar").style.width = pct+"%";
  document.getElementById("count").textContent = n+" of "+PLAN.length+" days";
  document.getElementById("pct").textContent = pct+"%";
}

document.getElementById("list").addEventListener("click", e=>{
  if(e.target.closest("a")) return;            // tapping a passage link opens it; don't toggle
  const card = e.target.closest(".day"); if(!card) return;
  const d = card.getAttribute("data-d");
  if(done[d]) delete done[d]; else done[d]=todayISO();
  save();
  if(filter==="todo" && done[d]){ card.style.opacity="0"; setTimeout(render,180); }
  else render();
});

document.getElementById("vEsv").onclick = ()=>{version="ESV"; localStorage.setItem("bibleplan_ver","ESV");
  vEsv.classList.add("active"); vLsb.classList.remove("active"); render(); toast("Showing ESV links");};
document.getElementById("vLsb").onclick = ()=>{version="LSB"; localStorage.setItem("bibleplan_ver","LSB");
  vLsb.classList.add("active"); vEsv.classList.remove("active"); render(); toast("Showing LSB links");};
document.getElementById("fAll").onclick = ()=>{setView("read"); filter="all";
  fAll.classList.add("active"); fTodo.classList.remove("active"); render();};
document.getElementById("fTodo").onclick = ()=>{setView("read"); filter="todo";
  fTodo.classList.add("active"); fAll.classList.remove("active"); render();};
document.getElementById("jump").onclick = ()=>{
  setView("read");
  const next = PLAN.find(d=>!done[d.d]);
  if(!next){ toast("You've finished — nothing left!"); return; }
  if(filter==="todo"){ window.scrollTo({top:document.querySelector("main").offsetTop,behavior:"smooth"}); return; }
  const el = document.querySelector('.day[data-d="'+next.d+'"]');
  if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
  toast("Day "+next.d+" is next");
};
document.getElementById("reset").onclick = ()=>{
  if(confirm("Clear all progress on this device?")){ done={}; save(); render(); toast("Progress cleared"); }
};
document.getElementById("exp").onclick = ()=>{
  const blob = new Blob([JSON.stringify(done)], {type:"application/json"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "bible-plan-progress.json"; a.click();
  toast("Progress exported");
};
document.getElementById("imp").onclick = ()=> document.getElementById("file").click();
document.getElementById("file").onchange = (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ const obj=JSON.parse(r.result);
    for(const k in obj) if(obj[k]) done[k]=obj[k]; save(); render(); toast("Progress imported & merged");
  }catch(err){ toast("Couldn't read that file"); } };
  r.readAsText(f);
};

function setView(v){
  view = v;
  document.getElementById("list").style.display   = v==="pray" ? "none" : "";
  document.getElementById("prayer").style.display = v==="pray" ? "" : "none";
  document.getElementById("pray").classList.toggle("active", v==="pray");
  if(v==="pray") renderPrayers();
}
function renderPrayers(){
  const el = document.getElementById("prayList");
  if(!prayers.length){ el.innerHTML = '<div class="empty">No prayer requests yet.<br>Add one above and press Enter.</div>'; return; }
  el.innerHTML = prayers.map((p,i)=>
    '<div class="pray'+(p.done?' done':'')+'" data-i="'+i+'">'
    + '<div class="chk2">'+(p.done?'✓':'')+'</div>'
    + '<div class="pbody"><div class="ptext">'+escapeHtml(p.t)+'</div>'
    + '<div class="pmeta">Added '+fmtDate(p.a)+(p.done&&p.ans?' &middot; Answered '+fmtDate(p.ans):'')+'</div></div>'
    + '<button class="del" data-del="'+i+'" title="Delete">&times;</button></div>'
  ).join('');
}
document.getElementById("pray").onclick = ()=> setView(view==="pray"?"read":"pray");
document.getElementById("prayAdd").onclick = ()=>{
  const inp = document.getElementById("prayInput"); const v = inp.value.trim(); if(!v) return;
  prayers.unshift({t:v, a:todayISO(), done:false, ans:null}); inp.value=""; savePray(); renderPrayers();
};
document.getElementById("prayInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") document.getElementById("prayAdd").onclick();
});
document.getElementById("prayList").addEventListener("click", e=>{
  const del = e.target.closest("[data-del]");
  if(del){ const i=+del.getAttribute("data-del");
    if(confirm("Delete this prayer request?")){ prayers.splice(i,1); savePray(); renderPrayers(); } return; }
  const row = e.target.closest(".pray"); if(!row) return;
  const i = +row.getAttribute("data-i");
  prayers[i].done = !prayers[i].done;
  prayers[i].ans  = prayers[i].done ? todayISO() : null;
  savePray(); renderPrayers();
});
const startEl = document.getElementById("startDate");
startEl.value = localStorage.getItem("bibleplan_start") || "";
startEl.addEventListener("change", ()=>{ localStorage.setItem("bibleplan_start", startEl.value);
  if(startEl.value) toast("Start date saved"); });

if(version==="LSB"){ vLsb.classList.add("active"); vEsv.classList.remove("active"); }
render();
</script>
</body>
</html>
